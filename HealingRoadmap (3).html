                <div style={{ position: "relative" }}>
                  <div style={{ fontSize: 11, letterSpacing: 4, color: "#E07A5F", fontWeight: 700, textTransform: "uppercase", marginBottom: 10 }}>For Hard Moments</div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 26, fontWeight: 700, color: "#FDFAF6", marginBottom: 8 }}>Right Now I'm Struggling</div>
                  <div style={{ fontSize: 14, color: "#C8A0E8", fontStyle: "italic", marginBottom: 28 }}>{emergencyData.intro}</div>

                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: "#FDFAF6", marginBottom: 16 }}>60-Second Ground</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 32 }}>
                    {emergencyData.steps60.map((step, i) => (
                      <div key={i} onClick={() => setEmergencyStep(emergencyStep === i ? null : i)} style={{ background: emergencyStep === i ? "rgba(224,122,95,0.2)" : "rgba(255,255,255,0.06)", borderRadius: 14, padding: "16px 18px", cursor: "pointer", border: emergencyStep === i ? "1px solid #E07A5F50" : "1px solid transparent", display: "flex", gap: 14, alignItems: "center" }}>
                        <span style={{ fontSize: 22, flexShrink: 0 }}>{step.icon}</span>
                        <div>
                          <div style={{ fontSize: 10, color: "#E07A5F", fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", marginBottom: 4 }}>{step.time}</div>
                          <div style={{ fontSize: 14, color: "#FDFAF6", lineHeight: 1.65 }}>{step.action}</div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: "#FDFAF6", marginBottom: 16 }}>Truths to Hold</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 10, marginBottom: 32 }}>
                    {emergencyData.truths.map((t, i) => (
                      <div key={i} style={{ background: "rgba(255,255,255,0.06)", borderRadius: 14, padding: "16px", textAlign: "center", fontSize: 13, color: "#EDE3D8", lineHeight: 1.65, fontStyle: "italic" }}>"{t}"</div>
                    ))}
                  </div>

                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: "#FDFAF6", marginBottom: 16 }}>Where to Go in This App</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 28 }}>
                    {emergencyData.whenToReach.map((w, i) => (
                      <div key={i} style={{ background: "rgba(255,255,255,0.06)", borderRadius: 12, padding: "14px 18px", display: "flex", gap: 14, flexWrap: "wrap" }}>
                        <div style={{ fontSize: 13, color: "#C8A0E8", fontWeight: 700, minWidth: 160 }}>{w.situation}</div>
                        <div style={{ fontSize: 13, color: "#EDE3D8", flex: 1, lineHeight: 1.6 }}>→ {w.action}</div>
                      </div>
                    ))}
                  </div>

                  <div style={{ background: "rgba(224,122,95,0.15)", borderRadius: 14, padding: "16px 18px", border: "1px solid rgba(224,122,95,0.3)", fontSize: 13, color: "#EDE3D8", lineHeight: 1.75 }}>
                    🆘 {emergencyData.crisis}
                  </div>
                </div>
              </div>
            </div>

            {/* MILESTONES SECTION */}
            <div style={{ marginBottom: 60 }}>
              <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 30, fontWeight: 700, color: "#2C2416" }}>My Milestones</div>
              <div className="section-divider" />
              <p style={{ fontSize: 14, color: "#7A6A5A", marginBottom: 20, lineHeight: 1.7, maxWidth: 580 }}>{milestonesData.truth}</p>

              <button onClick={() => setShowMilestoneForm(!showMilestoneForm)} style={{
                padding: "12px 24px", borderRadius: 20, marginBottom: 24,
                background: "linear-gradient(135deg, #C0973A, #E07A5F)",
                color: "#FFFFFF", border: "none", fontSize: 14, fontWeight: 700,
                fontFamily: "'Lato', sans-serif", cursor: "pointer",
              }}>{showMilestoneForm ? "Cancel" : "✨ Record a Milestone"}</button>

              {showMilestoneForm && (
                <div className="fade-in" style={{ background: "#FFFFFF", borderRadius: 20, padding: "28px", boxShadow: "0 8px 32px rgba(0,0,0,0.08)", marginBottom: 24, border: "1px solid #EDE8E0" }}>
                  <div style={{ fontSize: 12, fontWeight: 700, color: "#C0973A", letterSpacing: 2, textTransform: "uppercase", marginBottom: 14 }}>What did you do?</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 20 }}>
                    {milestonesData.categories.map((cat, i) => (
                      <button key={i} onClick={() => setNewMilestone(m => ({ ...m, category: cat.label }))} style={{
                        padding: "8px 16px", borderRadius: 20, fontSize: 12, fontWeight: 700,
                        background: newMilestone.category === cat.label ? cat.color : "#F5F0E8",
                        color: newMilestone.category === cat.label ? "#FFFFFF" : "#5A4A3A",
                        border: `2px solid ${newMilestone.category === cat.label ? cat.color : "transparent"}`,
                        cursor: "pointer", fontFamily: "'Lato', sans-serif", transition: "all 0.2s",
                      }}>{cat.icon} {cat.label}</button>
                    ))}
                  </div>
                  <textarea value={newMilestone.text} onChange={e => setNewMilestone(m => ({ ...m, text: e.target.value }))}
                    placeholder="Describe what happened. Be specific. You earned this."
                    style={{ width: "100%", minHeight: 100, padding: "14px", borderRadius: 14, border: "2px solid #EDE8E0", fontSize: 14, fontFamily: "'Lato', sans-serif", lineHeight: 1.7, color: "#2C2416", resize: "vertical", background: "#FDFAF6", outline: "none", marginBottom: 14 }} />
                  <button onClick={saveMilestone} style={{ padding: "12px 28px", borderRadius: 14, background: "#C0973A", color: "#FFFFFF", border: "none", fontSize: 14, fontWeight: 700, fontFamily: "'Lato', sans-serif", cursor: "pointer" }}>Save Milestone</button>
                </div>
              )}

              {milestoneEntries.length === 0 ? (
                <div style={{ textAlign: "center", padding: "48px 20px", background: "#FFFFFF", borderRadius: 20, boxShadow: "0 4px 16px rgba(0,0,0,0.06)" }}>
                  <div style={{ fontSize: 36, marginBottom: 12 }}>✨</div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: "#2C2416", marginBottom: 6 }}>Your first milestone is waiting</div>
                  <div style={{ fontSize: 13, color: "#9A8A7A" }}>Every step forward counts. Even the small ones.</div>
                </div>
              ) : (
                <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
                  {milestoneEntries.map(m => {
                    const cat = milestonesData.categories.find(c => c.label === m.category);
                    return (
                      <div key={m.id} style={{ background: "#FFFFFF", borderRadius: 18, padding: "20px 24px", boxShadow: "0 4px 16px rgba(0,0,0,0.06)", borderLeft: `4px solid ${cat?.color || "#C0973A"}`, display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 16 }}>
                        <div style={{ flex: 1 }}>
                          {m.category && <div style={{ fontSize: 11, fontWeight: 700, color: cat?.color || "#C0973A", letterSpacing: 2, textTransform: "uppercase", marginBottom: 6 }}>{cat?.icon} {m.category}</div>}
                          <div style={{ fontSize: 14, color: "#2C2416", lineHeight: 1.75, marginBottom: 8 }}>{m.text}</div>
                          <div style={{ fontSize: 11, color: "#9A8A7A" }}>{m.date}</div>
                        </div>
                        <button onClick={() => deleteMilestone(m.id)} style={{ background: "transparent", border: "none", color: "#C8B8A8", cursor: "pointer", fontSize: 16, flexShrink: 0 }}>×</button>
                      </div>
                    );
                  })}
                </div>
              )}

              <div style={{ marginTop: 28, display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 12 }}>
                {milestonesData.categories.map((cat, i) => (
                  <div key={i} style={{ background: "#FFFFFF", borderRadius: 16, padding: "18px", boxShadow: "0 3px 12px rgba(0,0,0,0.05)", borderTop: `3px solid ${cat.color}` }}>
                    <div style={{ fontSize: 20, marginBottom: 6 }}>{cat.icon}</div>
                    <div style={{ fontWeight: 700, color: cat.color, fontSize: 13, marginBottom: 10 }}>{cat.label}</div>
                    {cat.examples.map((ex, j) => <div key={j} style={{ fontSize: 12, color: "#7A6A5A", lineHeight: 1.6, marginBottom: 4 }}>· {ex}</div>)}
                  </div>
                ))}
              </div>
            </div>

            {/* SPIRITUAL PRACTICE */}
            <div style={{ marginBottom: 60 }}>
              <div style={{
                background: "linear-gradient(160deg, #0D0D1A 0%, #1A0A2E 40%, #2A1040 70%, #1A1528 100%)",
                borderRadius: 28, overflow: "hidden", position: "relative",
              }}>
                {/* Starfield effect */}
                <div style={{ position: "absolute", inset: 0, background: "radial-gradient(circle at 20% 30%, rgba(192,151,58,0.25) 0%, transparent 40%), radial-gradient(circle at 80% 60%, rgba(155,89,182,0.2) 0%, transparent 45%), radial-gradient(circle at 50% 90%, rgba(61,153,112,0.15) 0%, transparent 40%), radial-gradient(circle at 70% 10%, rgba(224,122,95,0.15) 0%, transparent 35%)" }} />

                <div className="parenting-pad" style={{ position: "relative", padding: "52px 36px" }}>
                  <div style={{ fontSize: 11, letterSpacing: 6, color: "#E8C882", fontWeight: 700, textTransform: "uppercase", marginBottom: 14 }}>
                    Spiritual Practice
                  </div>
                  <div style={{ fontFamily: "'Playfair Display', serif", fontSize: "clamp(28px, 5vw, 42px)", fontWeight: 900, color: "#FDFAF6", marginBottom: 6, lineHeight: 1.1 }}>
                    Dare to Dream.<br />Dare to Live.
                  </div>
                  <div style={{ width: 60, height: 3, background: "linear-gradient(90deg, #E8C882, #C8A0E8)", borderRadius: 2, margin: "16px 0 20px" }} />
                  <div style={{ fontSize: 15, color: "#C8A882", fontStyle: "italic", lineHeight: 1.85, maxWidth: 580, marginBottom: 36 }}>
                    {spiritualData.truth}
                  </div>

                  {/* Main tabs */}
                  <div style={{ display: "flex", gap: 8, marginBottom: 32, flexWrap: "wrap" }}>
                    {[
                      { key: "vibration", label: "⚡ Raise Your Vibration" },
                      { key: "manifestation", label: "🌟 Authentic Manifestation" },
                      { key: "dare", label: "🦋 Dare to Live" },
                      { key: "affirmations", label: "✨ Affirmations" },
                      { key: "books", label: "📖 Books" },
                    ].map(({ key, label }) => (
                      <button key={key} className="parenting-tab" onClick={() => setSpiritualTab(key)} style={{
                        padding: "8px 18px", borderRadius: 20, fontSize: 12, fontWeight: 700,
                        background: spiritualTab === key ? "#E8C882" : "transparent",
                        color: spiritualTab === key ? "#0D0D1A" : "#E8C882",
                        border: "2px solid rgba(232,200,130,0.4)", cursor: "pointer",
                      }}>{label}</button>
                    ))}
                  </div>

                  {/* VIBRATION TAB */}
                  {spiritualTab === "vibration" && (
                    <div className="fade-in">
                      <div style={{ fontSize: 14, color: "#EDE3D8", lineHeight: 1.85, fontStyle: "italic", marginBottom: 24 }}>{spiritualData.vibration.intro}</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                        {spiritualData.vibration.practices.map((p, i) => (
                          <div key={i} style={{ background: "rgba(255,255,255,0.06)", borderRadius: 16, padding: "20px", borderLeft: "3px solid #E8C882" }}>
                            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 15, fontWeight: 700, color: "#E8C882", marginBottom: 8 }}>{p.name}</div>
                            <div style={{ fontSize: 13, color: "#EDE3D8", lineHeight: 1.8 }}>{p.detail}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* MANIFESTATION TAB */}
                  {spiritualTab === "manifestation" && (
                    <div className="fade-in">
                      <div style={{ fontSize: 14, color: "#EDE3D8", lineHeight: 1.85, fontStyle: "italic", marginBottom: 28 }}>{spiritualData.manifestation.intro}</div>
                      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: "#FDFAF6", marginBottom: 16 }}>5 Core Principles</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 32 }}>
                        {spiritualData.manifestation.principles.map((p, i) => (
                          <div key={i} style={{ background: "rgba(255,255,255,0.06)", borderRadius: 16, padding: "20px", display: "flex", gap: 14 }}>
                            <div style={{ width: 28, height: 28, borderRadius: "50%", background: "#E8C882", color: "#0D0D1A", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 13, flexShrink: 0 }}>{i + 1}</div>
                            <div>
                              <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 15, fontWeight: 700, color: "#E8C882", marginBottom: 6 }}>{p.title}</div>
                              <div style={{ fontSize: 13, color: "#EDE3D8", lineHeight: 1.8 }}>{p.detail}</div>
                            </div>
                          </div>
                        ))}
                      </div>
                      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: "#FDFAF6", marginBottom: 16 }}>Practices</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                        {spiritualData.manifestation.practices.map((p, i) => (
                          <div key={i} style={{ background: "rgba(232,200,130,0.08)", borderRadius: 16, padding: "20px", borderLeft: "3px solid #E8C882" }}>
                            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 15, fontWeight: 700, color: "#E8C882", marginBottom: 8 }}>{p.name}</div>
                            <div style={{ fontSize: 13, color: "#EDE3D8", lineHeight: 1.8 }}>{p.detail}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* DARE TO LIVE TAB */}
                  {spiritualTab === "dare" && (
                    <div className="fade-in">
                      <div style={{ fontSize: 14, color: "#EDE3D8", lineHeight: 1.85, fontStyle: "italic", marginBottom: 28 }}>{spiritualData.dareToLive.intro}</div>

                      {/* Bucket list categories */}
                      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: "#FDFAF6", marginBottom: 16 }}>Your Life List 🦋</div>
                      <div style={{ display: "flex", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
                        {spiritualData.dareToLive.bucketList.map((cat, i) => (
                          <button key={i} onClick={() => setBucketCategory(i)} className="parenting-tab" style={{
                            padding: "7px 14px", borderRadius: 20, fontSize: 12, fontWeight: 700,
                            background: bucketCategory === i ? cat.color : "transparent",
                            color: bucketCategory === i ? "#FFFFFF" : "#E8C882",
                            border: `2px solid ${bucketCategory === i ? cat.color : "rgba(232,200,130,0.3)"}`,
                            cursor: "pointer",
                          }}>{cat.icon} {cat.category.split(" ")[1]}</button>
                        ))}
                      </div>
                      {(() => {
                        const cat = spiritualData.dareToLive.bucketList[bucketCategory];
                        return (
                          <div style={{ background: "rgba(255,255,255,0.05)", borderRadius: 20, padding: "24px", marginBottom: 32, border: `1px solid ${cat.color}40` }}>
                            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: "#FDFAF6", marginBottom: 4 }}>{cat.icon} {cat.category}</div>
                            <div style={{ width: 40, height: 2, background: cat.color, borderRadius: 1, marginBottom: 16 }} />
                            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                              {cat.items.map((item, j) => (
                                <div key={j} style={{ display: "flex", gap: 12, alignItems: "flex-start", padding: "12px 14px", background: "rgba(255,255,255,0.05)", borderRadius: 12 }}>
                                  <span style={{ color: cat.color, fontSize: 16, flexShrink: 0 }}>✦</span>
                                  <span style={{ fontSize: 13, color: "#EDE3D8", lineHeight: 1.7 }}>{item}</span>
                                </div>
                              ))}
                            </div>
                          </div>
                        );
                      })()}

                      {/* Everyday joy */}
                      <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 18, fontWeight: 700, color: "#FDFAF6", marginBottom: 16 }}>Everyday Aliveness</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                        {spiritualData.dareToLive.everyday.map((p, i) => (
                          <div key={i} style={{ background: "rgba(255,255,255,0.06)", borderRadius: 16, padding: "18px 20px", borderLeft: "3px solid #C8A0E8" }}>
                            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 14, fontWeight: 700, color: "#C8A0E8", marginBottom: 6 }}>{p.practice}</div>
                            <div style={{ fontSize: 13, color: "#EDE3D8", lineHeight: 1.8 }}>{p.detail}</div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* AFFIRMATIONS TAB */}
                  {spiritualTab === "affirmations" && (
                    <div className="fade-in">
                      <div style={{ fontSize: 13, color: "#C8A882", fontStyle: "italic", marginBottom: 24, lineHeight: 1.7 }}>
                        Read these slowly. Let each one settle in your body before moving to the next. These are not wishes. They are truths you are growing into.
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 16 }}>
                        {spiritualData.affirmations.map((a, i) => {
                          const colors = ["#E8C882", "#C8A0E8", "#E07A5F", "#3D9970", "#9B59B6", "#C0973A", "#5B6FA6", "#E8C882"];
                          return (
                            <div key={i} style={{
                              background: "rgba(255,255,255,0.06)",
                              borderRadius: 20, padding: "28px 22px",
                              border: `1px solid ${colors[i]}30`,
                              textAlign: "center",
                              position: "relative", overflow: "hidden",
                            }}>
                              <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: `linear-gradient(90deg, ${colors[i]}, transparent)` }} />
                              <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 16, fontWeight: 700, color: "#FDFAF6", lineHeight: 1.55, marginBottom: 10 }}>"{a.text}"</div>
                              <div style={{ fontSize: 11, color: colors[i], letterSpacing: 1, fontStyle: "italic" }}>{a.sub}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  {/* BOOKS TAB */}
                  {spiritualTab === "books" && (
                    <div className="fade-in" style={{ display: "flex", flexDirection: "column", gap: 24 }}>
                      {spiritualData.books.map((section, i) => {
                        const colors = ["#E8C882", "#C8A0E8", "#3D9970"];
                        return (
                          <div key={i} style={{ background: "rgba(255,255,255,0.05)", borderRadius: 20, padding: "24px", border: `1px solid ${colors[i]}30` }}>
                            <div style={{ fontFamily: "'Playfair Display', serif", fontSize: 17, fontWeight: 700, color: colors[i], marginBottom: 16 }}>{section.category}</div>
                            {section.titles.map((book, j) => (
                              <div key={j} style={{ display: "flex", gap: 14, marginBottom: 14, paddingBottom: 14, borderBottom: j < section.titles.length - 1 ? "1px solid rgba(255,255,255,0.08)" : "none" }}>
                                <span style={{ fontSize: 18, flexShrink: 0 }}>📖</span>
                                <div>
                                  <div style={{ fontSize: 14, fontWeight: 700, color: "#FDFAF6", fontStyle: "italic", marginBottom: 4 }}>{book.title}</div>
                                  <div style={{ fontSize: 12, color: "#C8A882", lineHeight: 1.6 }}>{book.note}</div>
                                </div>
                              </div>
                            ))}
                          </div>
                        );
                      })}
                    </div>
                  )}

                </div>
              </div>
            </div>

            {/* AFFIRMATION */}
            <div style={{
              textAlign: "center", padding: "48px 28px",
              background: "#FFFFFF", borderRadius: 28,
              boxShadow: "0 6px 36px rgba(0,0,0,0.06)",
            }}>
              <div style={{ fontSize: 36, marginBottom: 20 }}>🌸</div>
              <div style={{
                fontFamily: "'Playfair Display', serif",
                fontSize: "clamp(18px, 4vw, 26px)",
                fontWeight: 700, fontStyle: "italic",
                color: "#2C2416", lineHeight: 1.55,
                maxWidth: 560, margin: "0 auto 20px",
              }}>
                "I am worthy of love that does not require me to disappear."
              </div>
              <div style={{ width: 60, height: 3, background: "linear-gradient(90deg,#E07A5F,#9B59B6)", borderRadius: 2, margin: "0 auto 20px" }} />
              <div style={{
                fontSize: 14, color: "#9A8A7A", fontStyle: "italic",
                lineHeight: 1.75, maxWidth: 460, margin: "0 auto",
              }}>
                Healing is not linear. Setbacks are part of the process — not proof of failure. The goal is not to erase your past. It's to stop letting it make decisions for you.
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.render(React.createElement(App), document.getElementById('root'));
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
