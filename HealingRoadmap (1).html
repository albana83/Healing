    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      background: #FDFAF6;

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #F5F0E8; }
    ::-webkit-scrollbar-thumb { background: #C8A882; border-radius: 4px; }

    .phase-card { cursor: pointer; transition: all 0.3s ease; }
    .phase-card:hover, .phase-card:active { transform: translateY(-5px); }
    .phase-card.active { transform: translateY(-3px); }

    .tab-btn { cursor: pointer; transition: all 0.2s ease; font-family: 'Lato', sans-serif; }
    .tab-btn:hover { opacity: 0.85; }
    .tab-btn:active { transform: scale(0.97); }

    .practice-item { transition: transform 0.2s ease; }

    .daily-card { transition: all 0.25s ease; }
    .daily-card:hover { transform: translateY(-3px); }

    .parenting-tab { cursor: pointer; transition: all 0.2s; font-family: 'Lato', sans-serif; }
    .parenting-tab:active { transform: scale(0.97); }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeSlideIn 0.35s ease forwards; }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .hero-title {
      background: linear-gradient(135deg, #FDFAF6 30%, #C8A882 60%, #FDFAF6 90%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    .section-divider {
      width: 60px; height: 3px;
      background: linear-gradient(90deg, #E07A5F, #9B59B6);
      border-radius: 2px;
      margin: 12px 0 24px;
    }

    /* Mobile safe area */
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 16px); }

    @media (max-width: 600px) {
      .phase-grid { grid-template-columns: repeat(3, 1fr) !important; gap: 10px !important; }
      .phase-card { padding: 16px 10px !important; }
      .phase-icon { font-size: 22px !important; }
      .phase-title { font-size: 12px !important; }
      .phase-timeline { display: none; }
      .daily-grid { grid-template-columns: 1fr !important; }
      .hero-pad { padding: 40px 20px 60px !important; }
      .content-pad { padding: 0 16px 60px !important; }
      .detail-pad { padding: 28px 20px !important; }
      .parenting-pad { padding: 32px 20px !important; }
    }
  </style>
</head>

    function App() {

      const [journalEntries, setJournalEntries] = useState(() => {

      const [selectedEntry, setSelectedEntry] = useState(null);

        setJournalEntries(entries);
        try { localStorage.setItem("healing_journal", JSON.stringify(entries)); } catch {}

        if (!newEntry.text.trim() && !newEntry.mood) return;
        const entry = {
          id: Date.now(),

          comments: [],
        };
        saveEntries([entry, ...journalEntries]);
        setNewEntry({ text: "", mood: "", bodyArea: "", bodySensation: "", phase: "" });
        setJournalView("list");
      };

      const addComment = (entryId) => {
        if (!therapistComment.trim()) return;
        const updated = journalEntries.map(e => e.id === entryId
          ? { ...e, comments: [...(e.comments || []), { text: therapistComment, date: new Date().toLocaleDateString("en-US", { month: "short", day: "numeric" }), time: new Date().toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit" }) }] }

        );
        saveEntries(updated);
        setTherapistComment("");
        setSelectedEntry(updated.find(e => e.id === entryId));
      };

      const deleteEntry = (entryId) => {
        saveEntries(journalEntries.filter(e => e.id !== entryId));
        if (selectedEntry?.id === entryId) { setSelectedEntry(null); setJournalView("list"); }
      };

      const moods = [
        { emoji: "🌑", label: "Dark" }, { emoji: "🌧", label: "Heavy" }, { emoji: "😔", label: "Sad" },

              <div style={{ width: 60, height: 3, background: "linear-gradient(90deg,#E07A5F,#9B59B6)", borderRadius: 2, margin: "0 auto 20px" }} />
              <div style={{
                fontSize: 14, color: "#9A8A7A", fontStyle: "italic",
                lineHeight: 1.75, maxWidth: 460, margin: "0 auto",
              }}>
                Healing is not linear. Setbacks are part of the process — not proof of failure. The goal is not to erase your past. It's to stop letting it make decisions for you.
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.render(React.createElement(App), document.getElementById('root'));
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
